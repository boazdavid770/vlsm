<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סימולטור Subnetting - פרויקט גמר</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-color: #e2e8f0;
            --accent-color: #38bdf8;
            --success-color: #22c55e;
            --border-color: #334155;
        }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { display: flex; flex-direction: row; gap: 20px; width: 100%; max-width: 1000px; height: 70vh; }
        .panel { background-color: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 10px; padding: 20px; flex: 1; display: flex; flex-direction: column; }
        .scenario-box { background-color: rgba(56, 189, 248, 0.1); border-right: 4px solid var(--accent-color); padding: 15px; margin-bottom: 20px; border-radius: 4px; }
        button { background-color: var(--accent-color); color: #0f172a; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .chat-container { flex-grow: 1; display: flex; flex-direction: column; border: 1px solid var(--border-color); border-radius: 5px; background-color: #0b1120; overflow: hidden; }
        .chat-history { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 80%; padding: 10px 15px; border-radius: 8px; line-height: 1.4; }
        .bot-msg { background-color: #1e293b; align-self: flex-start; }
        .user-msg { background-color: var(--accent-color); color: #0f172a; align-self: flex-end; }
        .input-area { display: flex; padding: 10px; background-color: var(--panel-bg); border-top: 1px solid var(--border-color); }
        input[type="text"] { flex-grow: 1; padding: 10px; border: 1px solid var(--border-color); border-radius: 4px; background-color: #0f172a; color: white; }
        .token-display { margin-top: auto; padding: 15px; border: 1px dashed var(--success-color); color: var(--success-color); text-align: center; display: none; }
    </style>
</head>
<body>

    <h1>עוזי - מנטור חלוקת רשתות (VLSM)</h1>
    <div class="container">
        <div class="panel">
            <h2>תרחיש המעבדה</h2>
            <button onclick="generateScenario()">הגרל משימה חדשה 🎲</button>
            <div id="scenarioText" class="scenario-box">לחץ על הכפתור כדי להתחיל.</div>
            <div id="tokenBox" class="token-display">כל הכבוד! קוד אימות:<br><strong>[VLSM-VERIFIED-SUCCESS-2026]</strong></div>
        </div>
        <div class="panel" style="padding: 0;">
            <div class="chat-container">
                <div class="chat-history" id="chatHistory">
                    <div class="message bot-msg">שלום, אני עוזי. הגרל משימה ונתחיל!</div>
                </div>
                <div class="input-area">
                    <input type="text" id="userInput" placeholder="הקלד כאן..." onkeypress="handleKeyPress(event)">
                    <button onclick="sendMessage()">שלח</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const keyPart1 = "AQ.Ab8RN6JHvS6FXiykuvLAu"; 
        const keyPart2 = "QUcxm4LBkVjd3cZvi7TjZEppNfdTA";
        const API_KEY = keyPart1 + keyPart2;
        
        const SYSTEM_PROMPT = `אתה "עוזי", חונך סוקרטי קשוח אך תומך, המומחה ברשתות תקשורת ו-Subnetting... (המשך ההנחיות כפי שסיכמנו)`;

        let chatHistoryData = [];
        const scenarios = [
            "קיבלת את הרשת 192.168.10.0/24. עליך להקים תת-רשת עבור מחלקת הפיתוח הדורשת 60 מחשבים.",
            "קיבלת את הרשת 172.16.0.0/16. מחלקת משאבי אנוש זקוקה ל-120 משתמשים.",
            "לארגון הוקצתה הרשת 10.0.0.0/8. מחלקת הנהלה צריכה 14 מחשבים."
        ];

        function generateScenario() {
            document.getElementById("scenarioText").innerText = scenarios[Math.floor(Math.random() * scenarios.length)];
            chatHistoryData = []; 
            document.getElementById("chatHistory").innerHTML = '<div class="message bot-msg">המשימה עודכנה. מהי חזקת ה-2 הקרובה ביותר למספר המארחים?</div>';
            document.getElementById("tokenBox").style.display = "none";
        }

        async function sendMessage() {
            const inputField = document.getElementById("userInput");
            const message = inputField.value.trim();
            if (!message) return;

            addMessageToChat("user", message);
            inputField.value = "";
            chatHistoryData.push({ role: "user", parts: [{ text: message }] });

            try {
                // השינוי הקריטי: הגדרת המודל בתוך ה-Body של ה-JSON
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        "model": "models/gemini-1.5-flash",
                        "systemInstruction": { parts: [{ text: SYSTEM_PROMPT }] },
                        "contents": chatHistoryData
                    })
                });

                const data = await response.json();
                if (data.candidates) {
                    const botReply = data.candidates[0].content.parts[0].text;
                    chatHistoryData.push({ role: "model", parts: [{ text: botReply }] });
                    addMessageToChat("bot", botReply);
                    if (botReply.includes("[VLSM-VERIFIED-SUCCESS-2026]")) document.getElementById("tokenBox").style.display = "block";
                }
            } catch (error) {
                addMessageToChat("bot", "שגיאה בגישה ל-API. נסה שוב.");
            }
        }

        function addMessageToChat(sender, text) {
            const chatHistory = document.getElementById("chatHistory");
            const msgDiv = document.createElement("div");
            msgDiv.className = `message ${sender === 'user' ? 'user-msg' : 'bot-msg'}`;
            msgDiv.innerHTML = text.replace(/\n/g, '<br>'); 
            chatHistory.appendChild(msgDiv);
        }
        
        function handleKeyPress(e) { if (e.key === "Enter") sendMessage(); }
    </script>
</body>
</html>
